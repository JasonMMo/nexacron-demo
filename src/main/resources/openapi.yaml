openapi: 3.0.0
info:
  title: Nexacro Demo API
  description: Apple Reminders Clone API Documentation
  version: 1.0.0
  contact:
    name: API Support
    email: support@nexacron.com

servers:
  - url: http://localhost:9090
    description: Development server

paths:
  /api/auth/signup:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: password123
                name:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  email:
                    type: string
                    example: user@example.com
                  name:
                    type: string
                    example: John Doe
        '400':
          description: Invalid input data
        '409':
          description: User with this email already exists

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: Invalid credentials

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      description: Returns the profile of the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  email:
                    type: string
                    example: user@example.com
                  name:
                    type: string
                    example: John Doe
        '401':
          description: Unauthorized - Invalid or missing token

  /api/categories:
    get:
      tags:
        - Categories
      summary: Get all user categories
      description: Retrieve all categories belonging to the authenticated user
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
          description: User ID for authentication
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
    post:
      tags:
        - Categories
      summary: Create a new category
      description: Create a new category for the authenticated user
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Invalid input data
        '409':
          description: Category with this name already exists

  /api/categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category by ID
      description: Retrieve a specific category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Category not found
    put:
      tags:
        - Categories
      summary: Update a category
      description: Update an existing category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Category not found
    delete:
      tags:
        - Categories
      summary: Delete a category
      description: Delete an existing category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Category deleted successfully
        '404':
          description: Category not found

  /api/reminders:
    get:
      tags:
        - Reminders
      summary: Get all user reminders
      description: Retrieve all reminders belonging to the authenticated user
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of reminders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'
    post:
      tags:
        - Reminders
      summary: Create a new reminder
      description: Create a new reminder for the authenticated user
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderRequest'
      responses:
        '201':
          description: Reminder created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'

  /api/reminders/{id}:
    get:
      tags:
        - Reminders
      summary: Get reminder by ID
      description: Retrieve a specific reminder by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reminder found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '404':
          description: Reminder not found
    put:
      tags:
        - Reminders
      summary: Update a reminder
      description: Update an existing reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderRequest'
      responses:
        '200':
          description: Reminder updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '404':
          description: Reminder not found
    delete:
      tags:
        - Reminders
      summary: Delete a reminder
      description: Delete an existing reminder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Reminder deleted successfully
        '404':
          description: Reminder not found

  /api/reminders/{id}/complete:
    patch:
      tags:
        - Reminders
      summary: Toggle reminder completion status
      description: Toggle between completed and incomplete status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reminder status toggled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reminder'
        '404':
          description: Reminder not found

  /api/reminders/category/{categoryId}:
    get:
      tags:
        - Reminders
      summary: Get reminders by category
      description: Retrieve all reminders in a specific category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of reminders in category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'

  /api/reminders/overdue:
    get:
      tags:
        - Reminders
      summary: Get overdue reminders
      description: Retrieve all reminders that are overdue
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of overdue reminders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'

  /api/reminders/priority/{priority}:
    get:
      tags:
        - Reminders
      summary: Get reminders by priority
      description: Retrieve all reminders with a specific priority level
      parameters:
        - name: priority
          in: path
          required: true
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH]
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of reminders by priority
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'

  /api/reminders/search:
    get:
      tags:
        - Reminders
      summary: Search reminders
      description: Search reminders by keyword in title or description
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reminder'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: John Doe
        active:
          type: boolean
          example: true

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Work
        description:
          type: string
          example: Work related tasks
        createdAt:
          type: string
          format: date-time
          example: "2024-01-20T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-20T10:00:00Z"

    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Work
        description:
          type: string
          example: Work related tasks

    Reminder:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Team Meeting
        description:
          type: string
          example: Weekly team sync meeting
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          example: HIGH
        completed:
          type: boolean
          example: false
        completedAt:
          type: string
          format: date-time
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: "2024-01-20T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-20T10:00:00Z"
        category:
          $ref: '#/components/schemas/Category'

    ReminderRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Team Meeting
        description:
          type: string
          example: Weekly team sync meeting
        priority:
          type: string
          enum: [LOW, MEDIUM, HIGH]
          default: MEDIUM
          example: HIGH
        categoryId:
          type: integer
          nullable: true
          example: 1
        dueDate:
          type: string
          format: date-time
          nullable: true

tags:
  - name: Authentication
    description: User authentication and profile management
  - name: Categories
    description: Category management operations
  - name: Reminders
    description: Reminder management and filtering operations