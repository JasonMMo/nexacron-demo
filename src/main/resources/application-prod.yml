# 운영 환경 설정 (Production)
server:
  port: 8080

spring:
  profiles: prod

  # DataSource 설정 (운영용 MySQL)
  datasource:
    url: jdbc:mysql://localhost:3306/nexacron_demo?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      max-lifetime: 1800000

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
        order_inserts: true
        order_updates: true
        format_sql: false
        jdbc:
          batch_size: 100
          order_inserts: true
          order_updates: true

  # Jackson 설정
  jackson:
    serialization:
      fail-on-empty-beans: false
      default-view-inclusion: false


# Actuator 설정 (운영 환경)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never