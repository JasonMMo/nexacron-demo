# 개발 환경 설정 (Development)
server:
  port: 9090

spring:
  config:
    activate:
      on-profile: dev

  # DataSource 설정 (개발용 H2)
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      connection-test-query: SELECT 1

  # H2 콘솔 설정
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: true

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        default_batch_fetch_size: 100
        order_inserts: true
        order_updates: true

  # Jackson 설정
  jackson:
    serialization:
      fail-on-empty-beans: false

  # JWT 설정
  jwt:
    secret: nexacron-demo-dev-jwt-secret-key-2024
    expiration: 86400000

# Actuator 설정 (개발 환경에서만 사용)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always